<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-tertiary-container": "#f78b30",
            "surface-dim": "#d9dada",
            "surface-container-low": "#f3f4f4",
            "on-primary-fixed": "#051d30",
            "surface-container-lowest": "#ffffff",
            "outline-variant": "#c4c6cd",
            "on-background": "#191c1c",
            "primary-container": "#293e53",
            "secondary-container": "#d3e4f8",
            "on-tertiary-fixed-variant": "#713700",
            "secondary": "#506071",
            "on-surface": "#191c1c",
            "surface-container": "#edeeee",
            "on-surface-variant": "#43474c",
            "tertiary-fixed-dim": "#ffb783",
            "on-tertiary": "#ffffff",
            "error-container": "#ffdad6",
            "primary-fixed-dim": "#b3c9e2",
            "on-primary-container": "#94a9c2",
            "inverse-primary": "#b3c9e2",
            "surface-variant": "#e1e3e3",
            "on-primary-fixed-variant": "#34495e",
            "surface-container-high": "#e7e8e8",
            "secondary-fixed-dim": "#b8c8db",
            "on-secondary": "#ffffff",
            "primary": "#12283c",
            "surface": "#f8f9f9",
            "error": "#ba1a1a",
            "on-secondary-fixed-variant": "#394858",
            "tertiary-container": "#612f00",
            "tertiary-fixed": "#ffdcc5",
            "primary-fixed": "#cfe5ff",
            "secondary-fixed": "#d3e4f8",
            "inverse-surface": "#2e3131",
            "background": "#f8f9f9",
            "tertiary": "#411d00",
            "on-secondary-fixed": "#0c1d2b",
            "on-tertiary-fixed": "#301400",
            "surface-tint": "#4b6076",
            "inverse-on-surface": "#f0f1f1",
            "surface-container-highest": "#e1e3e3",
            "on-primary": "#ffffff",
            "surface-bright": "#f8f9f9",
            "outline": "#74777d",
            "on-error": "#ffffff",
            "on-error-container": "#93000a",
            "on-secondary-container": "#566677"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .editorial-gradient-bg {
      background: radial-gradient(circle at top right, #cfe5ff 0%, #f8f9f9 45%);
    }

    .premium-btn-gradient {
      background: linear-gradient(135deg, #12283c 0%, #293e53 100%);
    }
  </style>
</head>

<body
  class="bg-background font-body text-on-background editorial-gradient-bg min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-[440px] flex flex-col items-center">
    <!-- Brand Identity Section -->
    <div class="mb-10 text-center">
      <h1 class="font-headline text-4xl font-extrabold tracking-tight text-primary mb-2">Thallus</h1>
      <p class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Decision Intelligence v4.2</p>
    </div>
    <!-- Login Card -->
    <div class="w-full bg-surface-container-lowest rounded-xl p-10 shadow-[0_40px_40px_-10px_rgba(25,28,28,0.06)]">
      <header class="mb-8">
        <h2 class="font-headline text-2xl font-bold text-on-surface mb-1">Welcome Back</h2>
        <p class="text-secondary text-sm">Please enter your credentials to access the engine.</p>
      </header>
      <form class="space-y-6">
        <!-- Input Group: Email -->
        <div class="space-y-2">
          <label class="font-label text-xs font-semibold text-secondary uppercase tracking-wider" for="email">Email
            Address</label>
          <div class="relative">
            <input
              class="w-full bg-surface-container-low border-none rounded-lg py-3.5 px-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all outline-none"
              id="email" name="email" placeholder="name@company.com" type="email" />
          </div>
        </div>
        <!-- Input Group: Password -->
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="font-label text-xs font-semibold text-secondary uppercase tracking-wider"
              for="password">Password</label>
            <a class="text-xs font-semibold text-primary hover:underline decoration-primary/30 transition-all"
              href="#">Forgot Password?</a>
          </div>
          <div class="relative">
            <input
              class="w-full bg-surface-container-low border-none rounded-lg py-3.5 px-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all outline-none"
              id="password" name="password" placeholder="••••••••" type="password" />
          </div>
        </div>
        <!-- Remember Me Toggle (Contextual Logic) -->
        <div class="flex items-center space-x-2 pt-1">
          <input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember"
            type="checkbox" />
          <label class="text-sm text-on-surface-variant font-medium" for="remember">Keep me signed in</label>
        </div>
        <!-- Action: Sign In -->
        <div class="pt-4">
          <button
            class="premium-btn-gradient w-full py-4 px-6 rounded-lg text-on-primary font-headline font-bold text-center flex items-center justify-center space-x-2 active:scale-[0.98] transition-transform shadow-lg shadow-primary/20"
            type="submit">
            <span>Sign In</span>
            <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
          </button>
        </div>
      </form>
    </div>
    <!-- Footer Actions -->
    <footer class="mt-8 text-center space-y-4">
      <p class="text-sm text-secondary">
        Don't have an account?
        <a class="font-bold text-primary hover:underline decoration-primary/30 ml-1" href="#">Sign Up</a>
      </p>
      <div class="flex items-center justify-center space-x-4 pt-4 opacity-40">
        <span class="font-label text-[10px] uppercase tracking-tighter">Security Certified</span>
        <span class="w-1 h-1 bg-outline-variant rounded-full"></span>
        <span class="font-label text-[10px] uppercase tracking-tighter">Encrypted Session</span>
      </div>
    </footer>
  </div>
  <!-- Background Decorative Elements -->
  <div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
    <div class="absolute top-[10%] left-[5%] w-[400px] h-[400px] bg-secondary-container/20 blur-[120px] rounded-full">
    </div>
    <div class="absolute bottom-[10%] right-[5%] w-[500px] h-[500px] bg-tertiary-fixed/10 blur-[150px] rounded-full">
    </div>
  </div>
</body>

</html>
